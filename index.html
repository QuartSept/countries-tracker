<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:       #f0f4ff;
  --surface:  #ffffff;
  --surface2: #f7f9ff;
  --border:   #dde5f8;
  --text:     #1a1f3c;
  --muted:    #7b87b8;
  --accent:   #4f6ef7;
  --accent2:  #f7564f;
  --green:    #22c97a;
  --yellow:   #fbbf24;
  --purple:   #a855f7;
  --checked-fill: #4f6ef7;
  --checked-bg:   #eef1ff;
  --checked-border: #b8c3fb;
  --hover-map: #fbbf24;
  --font: 'Nunito', sans-serif;
  --radius: 16px;
  --shadow: 0 2px 16px #4f6ef718;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  min-height: 100vh;
}

/* ── CONFIG BANNER ── */
#config-banner {
  background: #fff8ed;
  border-bottom: 2px solid #fde68a;
  padding: 10px 24px;
  font-size: 13px;
  color: #92400e;
  display: flex;
  gap: 8px;
  align-items: center;
}
#config-banner.hidden { display: none; }

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  box-shadow: var(--shadow);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #4f6ef7, #a855f7);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text { color: var(--text); }
.logo-text span { color: var(--accent); }

/* stats pills */
.header-stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-pill {
  background: var(--checked-bg);
  border: 2px solid var(--checked-border);
  border-radius: 40px;
  padding: 6px 16px;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-pill .num { font-size: 18px; color: var(--accent2); }
.online-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: blink 2s infinite;
  display: inline-block;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── MAP SECTION ── */
.map-wrap {
  margin: 24px 24px 0;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow);
  position: relative;
}

#world-map {
  width: 100%;
  height: 420px;
  display: block;
}

#world-map path {
  fill: #dde8ff;
  stroke: #ffffff;
  stroke-width: 0.5;
  transition: fill .2s, filter .2s;
  cursor: pointer;
}
#world-map path.hover-hl {
  fill: var(--hover-map);
  filter: drop-shadow(0 0 10px #fbbf2466);
}
#world-map path.is-checked {
  fill: var(--checked-fill);
  filter: drop-shadow(0 0 7px #4f6ef755);
}
#world-map path.is-checked.hover-hl {
  fill: #2a4cdd;
  filter: drop-shadow(0 0 12px #4f6ef799);
}

/* map tooltip */
#map-tip {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 700;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  white-space: nowrap;
  z-index: 10;
}

/* map legend */
.map-legend {
  position: absolute;
  bottom: 14px; right: 18px;
  display: flex; gap: 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
}
.leg { display: flex; align-items: center; gap: 5px; }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; }

/* map decor dots */
.map-decor {
  position: absolute;
  top: 16px; left: 20px;
  display: flex; gap: 6px;
}
.decor-dot {
  width: 10px; height: 10px; border-radius: 50%;
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 10px;
  padding: 20px 24px 10px;
  flex-wrap: wrap;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 380px;
}
.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px 10px 42px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px #4f6ef722;
}
#search::placeholder { color: var(--muted); font-weight: 400; }

.filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.fbtn {
  padding: 8px 16px;
  border-radius: 40px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.fbtn:hover { border-color: var(--accent); color: var(--accent); }
.fbtn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 3px 12px #4f6ef740;
}

.region-sel {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 9px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
}
.region-sel:focus { border-color: var(--accent); }

/* ── LIST ── */
.list-section { padding: 10px 24px 56px; }

.region-group { margin-bottom: 28px; }

.region-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 4px 12px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 10px;
}
.region-emoji { font-size: 20px; }
.region-title {
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.region-count {
  margin-left: auto;
  background: var(--border);
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  padding: 2px 9px;
  border-radius: 20px;
}

.country-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 6px;
}

.country-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .1s;
  border: 2px solid transparent;
  background: var(--surface);
  user-select: none;
  position: relative;
}
.country-item:hover {
  border-color: var(--border);
  background: #f0f4ff;
  transform: translateY(-1px);
  box-shadow: 0 3px 12px #4f6ef715;
}
.country-item:active { transform: translateY(0); }

/* checked state */
.country-item.is-checked {
  background: var(--checked-bg);
  border-color: var(--checked-border);
}
.country-item.is-checked .country-name {
  color: var(--accent);
  font-weight: 700;
}
.country-item.is-checked .check-box {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 10px #4f6ef760;
}

/* map-hover glow on list item */
.country-item.map-hl {
  background: #fffbeb;
  border-color: #fbbf24;
}

.flag { font-size: 22px; line-height: 1; flex-shrink: 0; }

.country-name {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  transition: color .15s;
}

.check-box {
  width: 22px; height: 22px;
  border-radius: 7px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 900;
  color: transparent;
  transition: all .2s;
  flex-shrink: 0;
  background: var(--surface2);
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 18px;
  transition: opacity .4s;
}
#loading.fade-out { opacity: 0; pointer-events: none; }
.loader-globe { font-size: 52px; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--muted);
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media(max-width:600px){
  header { padding: 14px 16px; }
  .map-wrap { margin: 12px 12px 0; }
  #world-map { height: 220px; }
  .controls { padding: 12px 12px 4px; }
  .list-section { padding: 6px 12px 40px; }
}
</style>

/* ══ SUPABASE ══ */
function initSB() {
  if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') { demoMode = true; return; }
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    document.getElementById('config-banner').classList.add('hidden');
  } catch(e) { demoMode = true; }
}

async function loadChecks() {
  if (demoMode) return;
  try {
    const { data, error } = await sb.from('country_checks').select('country_code,checked');
    if (error) throw error;
    if (data) data.forEach(r => { if (r.checked) checks[r.country_code] = true; });
  } catch(e) { console.warn('loadChecks:', e); }
}

async function saveCheck(code, val) {
  if (demoMode) return;
  try {
    if (val) {
      await sb.from('country_checks').upsert({ country_code: code, checked: true });
    } else {
      await sb.from('country_checks').delete().eq('country_code', code);
    }
  } catch(e) { console.warn('saveCheck:', e); }
}

function subscribeRT() {
  if (!sb) return;
  sb.channel('cc').on('postgres_changes',{event:'*',schema:'public',table:'country_checks'}, p => {
    const r = p.new || p.old;
    if (!r) return;
    if (p.eventType === 'DELETE') delete checks[r.country_code];
    else checks[r.country_code] = r.checked;
    refreshItem(r.country_code);
    refreshMapPath(r.country_code);
    updateStats();
  }).subscribe();
}

/* ══ TOGGLE ══ */
function toggle(code) {
  if (checks[code]) delete checks[code];
  else checks[code] = true;
  saveCheck(code, !!checks[code]);
  refreshItem(code);
  refreshMapPath(code);
  updateStats();
}

/* ══ RENDER ══ */
function renderList() {
  const sec = document.getElementById('list-section');
  sec.innerHTML = '';
  const regionOrder = ['Afrika','Asya','Avrupa','Kuzey Amerika','Güney Amerika','Okyanusya'];
  regionOrder.forEach(region => {
    const list = COUNTRIES.filter(c => c.r === region);
    const grp = document.createElement('div');
    grp.className = 'region-group';
    grp.id = 'grp-' + region;
    grp.innerHTML = `
      <div class="region-header">
        <span class="region-emoji">${REGIONS[region]}</span>
        <span class="region-title">${region}</span>
        <span class="region-count" id="rc-${region}">${list.length}</span>
      </div>
      <div class="country-grid" id="grid-${region}"></div>`;
    sec.appendChild(grp);

    const grid = grp.querySelector('.country-grid');
    list.forEach(c => {
      const el = document.createElement('div');
      el.className = 'country-item' + (checks[c.code] ? ' is-checked' : '');
      el.dataset.code = c.code;
      el.dataset.name = c.name.toLocaleLowerCase('tr');
      el.dataset.region = c.r;
      el.innerHTML = `
        <span class="flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
        <div class="check-box">${checks[c.code] ? '✓' : ''}</div>`;
      el.onclick = () => toggle(c.code);
      el.addEventListener('mouseenter', () => { el.classList.add('map-hl'); hlMap(c.code, true); });
      el.addEventListener('mouseleave', () => { el.classList.remove('map-hl'); hlMap(c.code, false); });
      grid.appendChild(el);
    });
  });
}

function refreshItem(code) {
  const el = document.querySelector(`.country-item[data-code="${code}"]`);
  if (!el) return;
  const on = !!checks[code];
  el.classList.toggle('is-checked', on);
  el.querySelector('.check-box').textContent = on ? '✓' : '';
}

function refreshMapPath(code) {
  document.querySelectorAll(`#world-map [data-code="${code}"]`).forEach(p => {
    p.classList.toggle('is-checked', !!checks[code]);
  });
}

function updateStats() {
  document.getElementById('cnt-checked').textContent = Object.keys(checks).length;
  document.getElementById('cnt-total').textContent = COUNTRIES.length;
}

/* ══ FILTER ══ */
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  doFilter();
}

function doFilter() {
  const q = document.getElementById('search').value.toLocaleLowerCase('tr');
  const region = document.getElementById('rsel').value;
  document.querySelectorAll('.country-item').forEach(el => {
    const on = !!checks[el.dataset.code];
    let show = true;
    if (q && !el.dataset.name.includes(q)) show = false;
    if (region && el.dataset.region !== region) show = false;
    if (activeFilter === 'checked' && !on) show = false;
    if (activeFilter === 'unchecked' && on) show = false;
    el.style.display = show ? '' : 'none';
  });
  document.querySelectorAll('.region-group').forEach(g => {
    const any = [...g.querySelectorAll('.country-item')].some(i => i.style.display !== 'none');
    g.style.display = any ? '' : 'none';
  });
}

/* ══ MAP HIGHLIGHT ══ */
function hlMap(code, on) {
  document.querySelectorAll(`#world-map [data-code="${code}"]`).forEach(p =>
    p.classList.toggle('hover-hl', on)
  );
  const tip = document.getElementById('map-tip');
  if (on) {
    const c = COUNTRIES.find(x => x.code === code);
    tip.textContent = c ? `${c.flag} ${c.name}` : code;
    tip.style.opacity = '1';
  } else {
    tip.style.opacity = '0';
  }
}

/* ══ MAP LOAD ══ */
function loadMap() {
  const d3s = document.createElement('script');
  d3s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js';
  d3s.onload = () => {
    const ts = document.createElement('script');
    ts.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
    ts.onload = () => {
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(r => r.json())
        .then(topo => renderMap(topo))
        .catch(() => finishLoading());
    };
    document.head.appendChild(ts);
  };
  document.head.appendChild(d3s);
}

function renderMap(topo) {
  const svg = d3.select('#world-map');
  const proj = d3.geoNaturalEarth1().scale(320).translate([1000, 500]);
  const path = d3.geoPath().projection(proj);
  const countries = topojson.feature(topo, topo.objects.countries);

  svg.selectAll('path')
    .data(countries.features)
    .join('path')
    .attr('d', path)
    .attr('data-code', d => NUM_TO_A2[+d.id] || '')
    .classed('is-checked', d => !!checks[NUM_TO_A2[+d.id]])
    .on('mouseenter', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      if (!code) return;
      d3.select(this).classed('hover-hl', true);
      const c = COUNTRIES.find(x => x.code === code);
      const tip = document.getElementById('map-tip');
      tip.textContent = c ? `${c.flag} ${c.name}` : code;
      tip.style.opacity = '1';
      const li = document.querySelector(`.country-item[data-code="${code}"]`);
      if (li) li.classList.add('map-hl');
    })
    .on('mouseleave', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      d3.select(this).classed('hover-hl', false);
      document.getElementById('map-tip').style.opacity = '0';
      if (code) {
        const li = document.querySelector(`.country-item[data-code="${code}"]`);
        if (li) li.classList.remove('map-hl');
      }
    })
    .on('click', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      if (code && COUNTRIES.find(c => c.code === code)) toggle(code);
    });

  finishLoading();
}

function finishLoading() {
  const l = document.getElementById('loading');
  l.classList.add('fade-out');
  setTimeout(() => l.remove(), 500);
}

/* ══ BOOT ══ */
async function init() {
  initSB();
  await loadChecks();
  renderList();
  updateStats();
  subscribeRT();
  loadMap();
}

init();
