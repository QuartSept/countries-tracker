<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>197 Ülke 197 Film</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  /* ── CORE ── */
  --bg:        #0d0d0f;
  --surface:   #141418;
  --surface2:  #1c1c22;
  --surface3:  #242430;
  --border:    #2a2a38;
  --border2:   #3a3a50;

  /* ── TEXT ── */
  --text:      #f0eee8;
  --text2:     #a09e9a;
  --text3:     #5a5870;

  /* ── NEON ACCENTS ── */
  --neon:      #e8ff47;   /* ana neon sarı */
  --neon-dim:  #e8ff4722;

  /* ── BÖLGE RENKLERİ ── */
  --col-afrika:    #ff6b35;   /* yanık turuncu */
  --col-asya:      #ff3366;   /* neon kırmızı */
  --col-avrupa:    #4facfe;   /* elektrik mavi */
  --col-kuzey:     #43e97b;   /* neon yeşil */
  --col-guney:     #f9ca24;   /* altın sarı */
  --col-okyanusya: #a78bfa;   /* lila */

  /* ── MAP ── */
  --map-land:      #1e1e2e;
  --map-hover:     #e8ff47;
  --map-checked:   #e8ff47;

  --font-display: 'Playfair Display', serif;
  --font-body:    'Inter', sans-serif;
  --radius:       12px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  min-height: 100vh;
  /* subtle noise texture */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ── CONFIG BANNER ── */
#config-banner {
  background: #2a1800;
  border-bottom: 1px solid #f9ca2440;
  padding: 8px 24px;
  font-size: 12px;
  color: #f9ca24;
  display: flex; gap: 8px; align-items: center;
}
#config-banner.hidden { display: none; }

/* ══════════════════════════════════
   HERO HEADER
══════════════════════════════════ */
.hero {
  position: relative;
  padding: 40px 40px 0;
  overflow: hidden;
}

/* büyük arka plan yazı */
.hero-bg-text {
  position: absolute;
  top: -10px; left: -10px;
  font-family: var(--font-display);
  font-size: clamp(80px, 14vw, 180px);
  font-weight: 900;
  font-style: italic;
  color: transparent;
  -webkit-text-stroke: 1px #ffffff08;
  line-height: 1;
  white-space: nowrap;
  pointer-events: none;
  user-select: none;
  letter-spacing: -4px;
}

.hero-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.hero-title-block {}

.hero-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--neon);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.hero-eyebrow::before {
  content: '';
  display: block;
  width: 24px; height: 1px;
  background: var(--neon);
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 5vw, 68px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -2px;
  color: var(--text);
}
.hero-title em {
  font-style: italic;
  color: var(--neon);
  display: block;
}

/* stats block */
.hero-stats {
  display: flex;
  gap: 0;
  flex-shrink: 0;
}
.stat-block {
  padding: 16px 24px;
  border: 1px solid var(--border);
  background: var(--surface);
  text-align: center;
  position: relative;
}
.stat-block:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.stat-block:last-child  { border-radius: 0 var(--radius) var(--radius) 0; border-left: none; }
.stat-num {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 700;
  color: var(--neon);
  line-height: 1;
  display: block;
}
.stat-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-top: 4px;
  display: block;
}
.online-pip {
  position: absolute;
  top: 8px; right: 8px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 6px #22c55e;
  animation: pip 2s infinite;
}
@keyframes pip { 0%,100%{opacity:1}50%{opacity:.2} }

/* ══════════════════════════════════
   MAP
══════════════════════════════════ */
.map-section {
  margin: 32px 40px 0;
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}

/* sinema şeridi dekor */
.film-strip {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: repeating-linear-gradient(
    90deg,
    var(--neon) 0, var(--neon) 14px,
    transparent 14px, transparent 20px
  );
  opacity: 0.6;
}

#world-map {
  width: 100%;
  height: 400px;
  display: block;
}

#world-map path {
  fill: var(--map-land);
  stroke: #0d0d0f;
  stroke-width: 0.5;
  transition: fill .2s, filter .2s;
  cursor: pointer;
}
#world-map path.hover-hl {
  fill: var(--map-hover);
  filter: drop-shadow(0 0 12px #e8ff4766);
}
#world-map path.is-checked {
  fill: var(--neon);
  filter: drop-shadow(0 0 8px #e8ff4755);
}
#world-map path.is-checked.hover-hl {
  fill: #fff;
  filter: drop-shadow(0 0 16px #e8ff47cc);
}

/* map tooltip */
#map-tip {
  position: absolute;
  top: 18px; left: 50%;
  transform: translateX(-50%);
  background: var(--neon);
  color: #0d0d0f;
  border-radius: 6px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-body);
  letter-spacing: 0.5px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  white-space: nowrap;
  z-index: 10;
}

/* ══════════════════════════════════
   CONTROLS BAR
══════════════════════════════════ */
.controls {
  display: flex;
  gap: 10px;
  padding: 24px 40px 16px;
  flex-wrap: wrap;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}
.search-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
  color: var(--text3);
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 12px 9px 36px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#search:focus {
  border-color: var(--neon);
  box-shadow: 0 0 0 2px var(--neon-dim);
}
#search::placeholder { color: var(--text3); }

.filter-btns { display: flex; gap: 6px; }
.fbtn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all .2s;
}
.fbtn:hover { border-color: var(--neon); color: var(--neon); }
.fbtn.active {
  background: var(--neon);
  border-color: var(--neon);
  color: #0d0d0f;
  font-weight: 700;
}

.region-sel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 12px;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
}
.region-sel:focus { border-color: var(--neon); }
.region-sel option { background: var(--surface2); }

/* ══════════════════════════════════
   COUNTRY LIST
══════════════════════════════════ */
.list-section { padding: 8px 40px 64px; }

.region-group { margin-bottom: 40px; }

/* bölge başlık bandı */
.region-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
  padding-bottom: 12px;
  position: relative;
}
.region-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--region-color) 0%, transparent 60%);
  opacity: 0.5;
}

.region-color-bar {
  width: 3px;
  height: 28px;
  border-radius: 2px;
  background: var(--region-color);
  box-shadow: 0 0 10px var(--region-color);
  flex-shrink: 0;
}
.region-emoji { font-size: 18px; }
.region-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.region-count {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  color: var(--region-color);
  background: color-mix(in srgb, var(--region-color) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--region-color) 25%, transparent);
  padding: 2px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.country-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 4px;
}

/* ── COUNTRY ITEM ── */
.country-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  transition: background .15s, border-color .15s, transform .1s;
  user-select: none;
  position: relative;
}
.country-item:hover {
  background: var(--surface2);
  border-color: var(--border);
  transform: translateY(-1px);
}
.country-item:active { transform: translateY(0); }

/* checked */
.country-item.is-checked {
  background: var(--neon-dim);
  border-color: #e8ff4730;
}
.country-item.is-checked .country-name {
  color: var(--neon);
  font-weight: 600;
}
.country-item.is-checked .check-box {
  background: var(--neon);
  border-color: var(--neon);
  color: #0d0d0f;
  box-shadow: 0 0 10px #e8ff4766;
}

/* map hover highlight */
.country-item.map-hl {
  background: #e8ff4710;
  border-color: #e8ff4430;
}

.flag {
  font-size: 20px;
  line-height: 1;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 3px #0005);
}

.country-name {
  flex: 1;
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  transition: color .15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.check-box {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: transparent;
  transition: all .2s;
  flex-shrink: 0;
  background: var(--surface2);
}

/* film badge */
.film-badge {
  display: none;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 600;
  color: var(--neon);
  background: var(--neon-dim);
  border: 1px solid #e8ff4730;
  border-radius: 5px;
  padding: 2px 7px;
  white-space: nowrap;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}
.film-badge.visible { display: flex; }

/* ── FILM PANEL ── */
.film-info {
  display: none;
  flex-direction: column;
  gap: 10px;
  padding: 12px 14px 14px;
  margin-top: -2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  position: relative;
}
.film-info::before {
  content: '';
  position: absolute;
  top: 0; left: 14px; right: 14px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-dim), transparent);
}
.film-info.open { display: flex; }

.film-input {
  width: 100%;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.film-input:focus { border-color: var(--neon); box-shadow: 0 0 0 2px var(--neon-dim); }
.film-input::placeholder { color: var(--text3); }

.stars-row {
  display: flex;
  align-items: center;
  gap: 3px;
}
.stars-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-right: 6px;
}
.star-btn {
  font-size: 20px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px;
  line-height: 1;
  transition: transform .1s;
  filter: grayscale(1) brightness(0.4);
  display: block;
}
.star-btn:hover, .star-btn.lit {
  filter: none;
  transform: scale(1.2);
}

.film-save-btn {
  align-self: flex-end;
  padding: 7px 20px;
  background: var(--neon);
  color: #0d0d0f;
  border: none;
  border-radius: 7px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
}
.film-save-btn:hover { opacity: .85; transform: translateY(-1px); }
.film-save-btn:active { transform: translateY(0); }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 20px;
  transition: opacity .5s;
}
#loading.fade-out { opacity: 0; pointer-events: none; }

.loader-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 900;
  font-style: italic;
  color: var(--text);
  letter-spacing: -1px;
}
.loader-title span { color: var(--neon); }

.loader-bar-wrap {
  width: 200px;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: var(--neon);
  border-radius: 2px;
  animation: bar 1.4s ease-in-out infinite;
}
@keyframes bar {
  0% { width: 0%; margin-left: 0; }
  50% { width: 60%; margin-left: 20%; }
  100% { width: 0%; margin-left: 100%; }
}
.loader-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

@media(max-width:700px){
  .hero { padding: 24px 20px 0; }
  .hero-bg-text { display: none; }
  .map-section { margin: 20px 16px 0; }
  #world-map { height: 220px; }
  .controls { padding: 16px 20px 8px; }
  .list-section { padding: 8px 16px 48px; }
}
</style>
</head>

<!-- LOADING -->
<div id="loading">
  <div class="loader-title">197 Ülke <span>197 Film</span></div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-label">Harita yükleniyor</div>
</div>

<!-- CONFIG BANNER -->
<div id="config-banner">
  ⚠ Supabase bağlı değil — demo modunda çalışıyor.
</div>

<div class="hero">

  </div>
</div>

<!-- ══ MAP ══ -->
<div class="map-section">
  <div class="film-strip"></div>

  <svg id="world-map" viewBox="0 0 2000 1001" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<!-- ══ CONTROLS ══ -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Ülke ara…" oninput="doFilter()">

    <option>Kuzey Amerika</option>
    <option>Güney Amerika</option>
    <option>Okyanusya</option>
  </select>
</div>

<!-- ══ LIST ══ -->
<div class="list-section" id="list-section"></div>

/* ══ SUPABASE ══ */
function initSB() {
  if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') { demoMode = true; return; }
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    document.getElementById('config-banner').classList.add('hidden');
  } catch(e) { demoMode = true; }
}

async function loadChecks() {
  if (demoMode) return;
  try {
    const { data, error } = await sb.from('country_checks').select('country_code,checked,film,stars');
    if (error) throw error;
    if (data) data.forEach(r => {
      if (r.checked) checks[r.country_code] = { checked: true, film: r.film || '', stars: r.stars || 0 };
    });
  } catch(e) { console.warn('loadChecks:', e); }
}

async function saveCheck(code, data) {
  if (demoMode) return;
  try {
    if (data) {
      await sb.from('country_checks').upsert({ country_code: code, checked: true, film: data.film || '', stars: data.stars || 0 });
    } else {
      await sb.from('country_checks').delete().eq('country_code', code);
    }
  } catch(e) { console.warn('saveCheck:', e); }
}

function subscribeRT() {
  if (!sb) return;
  sb.channel('cc').on('postgres_changes',{event:'*',schema:'public',table:'country_checks'}, p => {
    const r = p.new || p.old;
    if (!r) return;
    if (p.eventType === 'DELETE') delete checks[r.country_code];
    else checks[r.country_code] = { checked: true, film: r.film || '', stars: r.stars || 0 };
    refreshItem(r.country_code);
    refreshMapPath(r.country_code);
    updateStats();
  }).subscribe();
}

/* ══ TOGGLE ══ */
function toggle(code) {
  if (checks[code]) {
    delete checks[code];
    saveCheck(code, null);
    refreshItem(code);
    refreshMapPath(code);
    updateStats();
  } else {
    checks[code] = { checked: true, film: '', stars: 0 };
    saveCheck(code, checks[code]);
    refreshItem(code);
    refreshMapPath(code);
    updateStats();
    const info = document.querySelector(`.film-info[data-code="${code}"]`);
    if (info) { info.classList.add('open'); info.querySelector('.film-input').focus(); }
  }
}

/* ══ RENDER ══ */
function renderList() {
  const sec = document.getElementById('list-section');
  sec.innerHTML = '';
  const regionOrder = ['Afrika','Asya','Avrupa','Kuzey Amerika','Güney Amerika','Okyanusya'];
  regionOrder.forEach(region => {
    const list = COUNTRIES.filter(c => c.r === region);
    const color = REGION_COLORS[region];
    const grp = document.createElement('div');
    grp.className = 'region-group';
    grp.id = 'grp-' + region;
    grp.style.setProperty('--region-color', color);
    grp.innerHTML = `
      <div class="region-header">
        <div class="region-color-bar"></div>
        <span class="region-emoji">${REGIONS[region]}</span>
        <span class="region-title">${region}</span>
        <span class="region-count">${list.length} ülke</span>
      </div>
      <div class="country-grid" id="grid-${region}"></div>`;
    sec.appendChild(grp);

    const grid = grp.querySelector('.country-grid');
    list.forEach(c => {
      const d = checks[c.code];
      const isChecked = !!d;
      const filmName = d ? d.film : '';
      const stars = d ? d.stars : 0;

      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;';
      wrap.dataset.wrapCode = c.code;
      wrap.dataset.wrapRegion = c.r;

      const el = document.createElement('div');
      el.className = 'country-item' + (isChecked ? ' is-checked' : '');
      el.dataset.code = c.code;
      el.dataset.name = c.name.toLocaleLowerCase('tr');
      el.dataset.region = c.r;
      el.innerHTML = `
        <span class="flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
        <div class="film-badge${filmName ? ' visible' : ''}" data-badge="${c.code}">
          <span class="badge-stars">${'⭐'.repeat(stars)}</span><span class="badge-text">${filmName ? filmName.substring(0,16) : ''}</span>
        </div>
        <div class="check-box">${isChecked ? '✓' : ''}</div>`;
      el.onclick = () => toggle(c.code);
      el.addEventListener('mouseenter', () => { el.classList.add('map-hl'); hlMap(c.code, true); });
      el.addEventListener('mouseleave', () => { el.classList.remove('map-hl'); hlMap(c.code, false); });

      const panel = document.createElement('div');
      panel.className = 'film-info';
      panel.dataset.code = c.code;
      panel.innerHTML = `
        <input class="film-input" type="text" placeholder="🎬 Film adını yaz…" value="${filmName || ''}" maxlength="80">
        <div class="stars-row">
          <span class="stars-label">Puan</span>
          ${[1,2,3,4,5].map(i => `<button class="star-btn${stars>=i?' lit':''}" data-star="${i}" onclick="setStar('${c.code}',${i},this)">⭐</button>`).join('')}
        </div>
        <button class="film-save-btn" onclick="saveFilm('${c.code}')">Kaydet</button>`;

      panel.querySelector('.film-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') saveFilm(c.code);
      });

      wrap.appendChild(el);
      wrap.appendChild(panel);
      grid.appendChild(wrap);
    });
  });
}

function refreshItem(code) {
  const el = document.querySelector(`.country-item[data-code="${code}"]`);
  if (!el) return;
  const d = checks[code];
  const on = !!d;
  el.classList.toggle('is-checked', on);
  el.querySelector('.check-box').textContent = on ? '✓' : '';
  const panel = document.querySelector(`.film-info[data-code="${code}"]`);
  if (panel && !on) panel.classList.remove('open');
  const badge = el.querySelector('.film-badge');
  if (badge) {
    const film = d ? d.film : '';
    const starsCount = d ? d.stars : 0;
    badge.classList.toggle('visible', !!film);
    const bt = badge.querySelector('.badge-text');
    if (bt) bt.textContent = film ? film.substring(0,16) : '';
    const bs = badge.querySelector('.badge-stars');
    if (bs) bs.textContent = '⭐'.repeat(starsCount);
  }
}

/* ══ STAR & FILM SAVE ══ */
function setStar(code, val, btn) {
  const row = btn.closest('.stars-row');
  row.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('lit', i < val));
  if (!checks[code]) checks[code] = { checked: true, film: '', stars: 0 };
  checks[code].stars = val;
}

function saveFilm(code) {
  if (!checks[code]) return;
  const panel = document.querySelector(`.film-info[data-code="${code}"]`);
  if (!panel) return;
  const film = panel.querySelector('.film-input').value.trim();
  const stars = checks[code].stars || 0;
  checks[code].film = film;
  saveCheck(code, checks[code]);
  const badge = document.querySelector(`.country-item[data-code="${code}"] .film-badge`);
  if (badge) {
    badge.classList.toggle('visible', !!film);
    const bt = badge.querySelector('.badge-text');
    if (bt) bt.textContent = film ? film.substring(0,16) : '';
    const bs = badge.querySelector('.badge-stars');
    if (bs) bs.textContent = '⭐'.repeat(stars);
  }
  panel.classList.remove('open');
}

function refreshMapPath(code) {
  const region = CODE_TO_REGION[code];
  const color = region ? REGION_COLORS[region] : '#e8ff47';
  document.querySelectorAll(`#world-map [data-code="${code}"]`).forEach(p => {
    const on = !!checks[code];
    p.classList.toggle('is-checked', on);
    p.style.fill = on ? color : '';
    if (on) p.style.filter = `drop-shadow(0 0 8px ${color}88)`;
    else p.style.filter = '';
  });
}

function updateStats() {
  document.getElementById('cnt-checked').textContent = Object.keys(checks).length;
  document.getElementById('cnt-total').textContent = COUNTRIES.length;
}

/* ══ FILTER ══ */
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  doFilter();
}

function doFilter() {
  const q = document.getElementById('search').value.toLocaleLowerCase('tr');
  const region = document.getElementById('rsel').value;
  document.querySelectorAll('[data-wrap-code]').forEach(wrap => {
    const code = wrap.dataset.wrapCode;
    const r = wrap.dataset.wrapRegion;
    const nameEl = wrap.querySelector('.country-name');
    const name = nameEl ? nameEl.textContent.toLocaleLowerCase('tr') : '';
    const on = !!checks[code];
    let show = true;
    if (q && !name.includes(q)) show = false;
    if (region && r !== region) show = false;
    if (activeFilter === 'checked' && !on) show = false;
    wrap.style.display = show ? '' : 'none';
  });
  document.querySelectorAll('.region-group').forEach(g => {
    const any = [...g.querySelectorAll('[data-wrap-code]')].some(i => i.style.display !== 'none');
    g.style.display = any ? '' : 'none';
  });
}

/* ══ MAP HIGHLIGHT ══ */
function hlMap(code, on) {
  document.querySelectorAll(`#world-map [data-code="${code}"]`).forEach(p =>
    p.classList.toggle('hover-hl', on)
  );
  const tip = document.getElementById('map-tip');
  if (on) {
    const c = COUNTRIES.find(x => x.code === code);
    tip.textContent = c ? `${c.flag}  ${c.name}` : code;
    tip.style.opacity = '1';
  } else {
    tip.style.opacity = '0';
  }
}

/* ══ MAP LOAD ══ */
function loadMap() {
  const d3s = document.createElement('script');
  d3s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js';
  d3s.onload = () => {
    const ts = document.createElement('script');
    ts.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
    ts.onload = () => {
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(r => r.json())
        .then(topo => renderMap(topo))
        .catch(() => finishLoading());
    };
    document.head.appendChild(ts);
  };
  document.head.appendChild(d3s);
}

function renderMap(topo) {
  const svg = d3.select('#world-map');
  const proj = d3.geoNaturalEarth1().scale(320).translate([1000, 500]);
  const path = d3.geoPath().projection(proj);
  const countries = topojson.feature(topo, topo.objects.countries);

  svg.selectAll('path')
    .data(countries.features)
    .join('path')
    .attr('d', path)
    .attr('data-code', d => NUM_TO_A2[+d.id] || '')
    .each(function(d) {
      const code = NUM_TO_A2[+d.id];
      if (code && checks[code]) {
        const region = CODE_TO_REGION[code];
        const color = REGION_COLORS[region] || '#e8ff47';
        this.style.fill = color;
        this.style.filter = `drop-shadow(0 0 8px ${color}88)`;
      }
    })
    .on('mouseenter', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      if (!code) return;
      d3.select(this).classed('hover-hl', true);
      const c = COUNTRIES.find(x => x.code === code);
      const tip = document.getElementById('map-tip');
      tip.textContent = c ? `${c.flag}  ${c.name}` : code;
      tip.style.opacity = '1';
      const li = document.querySelector(`.country-item[data-code="${code}"]`);
      if (li) li.classList.add('map-hl');
    })
    .on('mouseleave', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      d3.select(this).classed('hover-hl', false);
      document.getElementById('map-tip').style.opacity = '0';
      if (code) {
        const li = document.querySelector(`.country-item[data-code="${code}"]`);
        if (li) li.classList.remove('map-hl');
      }
    })
    .on('click', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      if (code && COUNTRIES.find(c => c.code === code)) toggle(code);
    });

  finishLoading();
}

function finishLoading() {
  const l = document.getElementById('loading');
  l.classList.add('fade-out');
  setTimeout(() => l.remove(), 500);
}

/* ══ BOOT ══ */
async function init() {
  initSB();
  await loadChecks();
  renderList();
  updateStats();
  subscribeRT();
  loadMap();
}

init();
</script>
</body>
