<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>195 Ülke 195 Film</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #1a0e1f;
  --bg2:       #221229;
  --surface:   #2a1635;
  --surface2:  #33183f;
  --surface3:  #3d1e4a;
  --border:    #4a2560;
  --border2:   #5e3178;

  --text:      #f5eff8;
  --text2:     #c9b8d4;
  --text3:     #8a6fa0;

  --sakura:    #ffb7c5;
  --sakura2:   #ff8fab;
  --sakura3:   #ffd6e0;
  --wisteria:  #c084fc;
  --mint:      #86efac;
  --peach:     #fda4af;
  --gold:      #fcd34d;
  --sky:       #7dd3fc;

  --accent:    #e879a0;
  --accent-glow: #e879a033;

  --col-afrika:    #fb923c;
  --col-asya:      #f472b6;
  --col-avrupa:    #818cf8;
  --col-kuzey:     #34d399;
  --col-guney:     #fbbf24;
  --col-okyanusya: #c084fc;

  --font-display: 'Cormorant Garamond', serif;
  --font-body:    'DM Sans', sans-serif;
  --radius: 14px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════
   PETAL CANVAS
══════════════════════════════ */
#petal-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ══ SAKURA TREE ══ */
#sakura-tree {
  position: fixed;
  right: -50px;
  bottom: -10px;
  width: 480px;
  height: 620px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.13;
  filter: blur(0.3px);
}

/* ══ BLOSSOM SILHOUETTE LEFT ══ */
#blossom-left {
  position: fixed;
  left: -20px;
  top: 40px;
  width: 260px;
  height: 320px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.07;
  filter: blur(0.5px);
}

/* everything above canvas */
#app { position: relative; z-index: 1; }

/* ══════════════════════════════
   CONFIG BANNER
══════════════════════════════ */
#config-banner {
  background: #2d1200;
  border-bottom: 1px solid #fb923c44;
  padding: 8px 24px;
  font-size: 12px;
  color: #fb923c;
  display: flex; gap: 8px; align-items: center;
  position: relative; z-index: 2;
}
#config-banner.hidden { display: none; }

/* ══════════════════════════════
   HERO
══════════════════════════════ */
.hero {
  padding: 48px 44px 0;
  position: relative;
}

/* arka plan ışık huzmesi */
.hero::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse at center,
    #e879a022 0%, #c084fc11 40%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
  position: relative;
}

.hero-left {}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #e879a022, #c084fc22);
  border: 1px solid #e879a044;
  border-radius: 40px;
  padding: 5px 14px 5px 10px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--sakura2);
  margin-bottom: 18px;
}
.hero-tag-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--sakura2);
  box-shadow: 0 0 6px var(--sakura2);
  animation: glow-pulse 2s infinite;
}
@keyframes glow-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 88px);
  font-weight: 600;
  line-height: 0.92;
  letter-spacing: -1px;
  color: var(--text);
  margin-bottom: 16px;
}
.hero-title .line2 {
  font-style: italic;
  background: linear-gradient(135deg, var(--sakura) 0%, var(--wisteria) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 14px;
  color: var(--text3);
  font-weight: 300;
  line-height: 1.7;
  max-width: 340px;
}

/* stats */
.hero-stats {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
  padding-top: 8px;
}
.stat-card {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
  min-width: 140px;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--sakura), transparent);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 44px;
  font-weight: 600;
  line-height: 1;
  background: linear-gradient(135deg, var(--sakura) 0%, var(--wisteria) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
}
.stat-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-top: 4px;
  display: block;
}
.stat-card .pip {
  position: absolute;
  top: 10px; right: 10px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  animation: glow-pulse 2s infinite;
}

/* ══════════════════════════════
   DIVIDER
══════════════════════════════ */
.petal-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 28px 44px 0;
  opacity: 0.5;
}
.petal-divider::before,
.petal-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}
.divider-icon { font-size: 18px; }

/* ══════════════════════════════
   MAP
══════════════════════════════ */
.map-section {
  margin: 20px 44px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 8px 40px #00000033, inset 0 1px 0 #ffffff08;
}

/* üst dekor şeridi */
.map-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    var(--col-afrika), var(--col-asya), var(--col-avrupa),
    var(--col-kuzey), var(--col-guney), var(--col-okyanusya));
  opacity: 0.7;
}

#world-map {
  width: 100%; height: 400px;
  display: block;
}

#world-map path {
  fill: #2e1a3d;
  stroke: #1a0e1f;
  stroke-width: 0.5;
  transition: fill .2s, filter .2s;
  cursor: pointer;
}
#world-map path.hover-hl {
  fill: var(--sakura);
  filter: drop-shadow(0 0 12px #ffb7c566);
}
#world-map path.is-checked {
  /* fill set via JS per region */
}
#world-map path.is-checked.hover-hl {
  filter: drop-shadow(0 0 16px currentColor) brightness(1.3);
}
#world-map path.is-skipped {
  fill: #1a0a24 !important;
  filter: none !important;
  opacity: 0.38;
}
#world-map path.is-skipped.hover-hl {
  opacity: 0.55;
  fill: #2d1040 !important;
}

#map-tip {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--sakura2), var(--wisteria));
  color: #fff;
  border-radius: 8px;
  padding: 5px 16px;
  font-size: 12px;
  font-weight: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  white-space: nowrap;
  z-index: 10;
  box-shadow: 0 4px 16px #e879a044;
}

/* ══════════════════════════════
   CONTROLS
══════════════════════════════ */
.controls {
  display: flex;
  gap: 10px;
  padding: 22px 44px 12px;
  flex-wrap: wrap;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1; min-width: 180px; max-width: 320px;
}
.search-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  pointer-events: none;
  color: var(--text3);
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 12px 9px 36px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#search:focus {
  border-color: var(--sakura2);
  box-shadow: 0 0 0 3px #ff8fab22;
}
#search::placeholder { color: var(--text3); }

.filter-btns { display: flex; gap: 6px; }
.fbtn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.fbtn:hover { border-color: var(--sakura2); color: var(--sakura); }
.fbtn.active {
  background: linear-gradient(135deg, #e879a0, #c084fc);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 3px 14px #e879a044;
}

.region-sel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 12px;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
}
.region-sel:focus { border-color: var(--sakura2); }
.region-sel option { background: var(--surface2); }

/* ══════════════════════════════
   LIST
══════════════════════════════ */
.list-section { padding: 8px 44px 72px; }

.region-group { margin-bottom: 40px; }

.region-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  padding-bottom: 14px;
  position: relative;
}
.region-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--region-color), transparent 50%);
  opacity: 0.4;
}

.region-gem {
  width: 10px; height: 10px;
  border-radius: 3px;
  background: var(--region-color);
  box-shadow: 0 0 12px var(--region-color);
  flex-shrink: 0;
  transform: rotate(45deg);
}
.region-emoji { font-size: 17px; }
.region-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  font-style: italic;
  color: var(--text);
  letter-spacing: 0.2px;
}
.region-count {
  margin-left: auto;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--region-color);
  background: color-mix(in srgb, var(--region-color) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--region-color) 28%, transparent);
  padding: 3px 10px;
  border-radius: 20px;
}

.country-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(235px, 1fr));
  gap: 4px;
}

/* ── COUNTRY ITEM ── */
.country-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  transition: background .15s, border-color .15s, transform .12s;
  user-select: none;
}
.country-item:hover {
  background: var(--surface2);
  border-color: var(--border);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px #00000022;
}
.country-item:active { transform: translateY(0); }

.country-item.is-checked {
  background: linear-gradient(135deg, #e879a012, #c084fc0c);
  border-color: #e879a030;
}
.country-item.is-checked .country-name {
  color: var(--sakura3);
  font-weight: 500;
}
.country-item.is-checked .check-box {
  background: linear-gradient(135deg, var(--sakura2), var(--wisteria));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 0 12px #e879a066;
}

.country-item.map-hl {
  background: #ffb7c510;
  border-color: #ffb7c530;
}

/* skipped */
.country-item.is-skipped {
  background: #1a0a2488;
  border-color: #3d1060;
  opacity: 0.45;
}
.country-item.is-skipped .country-name {
  color: var(--text3);
  text-decoration: line-through;
  text-decoration-color: #5a3070;
}
.country-item.is-skipped .skip-box {
  background: #7c1d4a;
  border-color: transparent;
  color: #ffb7c5;
  box-shadow: 0 0 8px #7c1d4a88;
}

.skip-box {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: transparent;
  transition: all .2s;
  flex-shrink: 0;
  background: var(--surface2);
  cursor: pointer;
}
.skip-box:hover:not(.active) {
  border-color: #7c1d4a;
  color: #7c1d4a;
}

.flag { font-size: 19px; line-height: 1; flex-shrink: 0; }

.country-name {
  flex: 1;
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  transition: color .15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.check-box {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: transparent;
  transition: all .2s;
  flex-shrink: 0;
  background: var(--surface2);
}

/* film badge */
.film-badge {
  display: none;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 500;
  color: var(--sakura);
  background: #e879a015;
  border: 1px solid #e879a030;
  border-radius: 5px;
  padding: 2px 7px;
  white-space: nowrap;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}
.film-badge.visible { display: flex; }

/* ── FILM PANEL ── */
.film-info {
  display: none;
  flex-direction: column;
  gap: 10px;
  padding: 12px 14px 14px;
  margin-top: -2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
}
.film-info::before {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(90deg, transparent, #e879a033, transparent);
  margin-bottom: 2px;
}
.film-info.open { display: flex; }

.film-input {
  width: 100%;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.film-input:focus {
  border-color: var(--sakura2);
  box-shadow: 0 0 0 2px #ff8fab1a;
}
.film-input::placeholder { color: var(--text3); }

.stars-row { display: flex; align-items: center; gap: 3px; }
.stars-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  margin-right: 6px;
}
.star-btn {
  font-size: 20px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px;
  line-height: 1;
  transition: transform .12s;
  filter: grayscale(1) brightness(0.35);
}
.star-btn:hover, .star-btn.lit {
  filter: none;
  transform: scale(1.2);
}

.film-save-btn {
  align-self: flex-end;
  padding: 7px 20px;
  background: linear-gradient(135deg, var(--sakura2), var(--wisteria));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s, transform .12s;
  box-shadow: 0 4px 16px #e879a044;
}
.film-save-btn:hover { opacity: .88; transform: translateY(-1px); }
.film-save-btn:active { transform: translateY(0); }

/* ══════════════════════════════
   LOADING
══════════════════════════════ */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  gap: 20px;
  transition: opacity .6s;
}
#loading.fade-out { opacity: 0; pointer-events: none; }

.loader-petals {
  font-size: 40px;
  animation: float-petals 2s ease-in-out infinite;
  letter-spacing: 6px;
}
@keyframes float-petals {
  0%,100%{ transform: translateY(0) rotate(-3deg); }
  50%    { transform: translateY(-10px) rotate(3deg); }
}

.loader-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  font-style: italic;
  background: linear-gradient(135deg, var(--sakura), var(--wisteria));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.loader-bar-wrap {
  width: 180px; height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--sakura2), var(--wisteria));
  border-radius: 2px;
  animation: lbar 1.4s ease-in-out infinite;
}
@keyframes lbar {
  0%  { width:0%; margin-left:0; }
  50% { width:55%; margin-left:22%; }
  100%{ width:0%; margin-left:100%; }
}

/* ── HİKAYE SAHNESİ ── */
#story-stage {
  position: absolute;
  bottom: 10px;
  left: 16px;
  z-index: 5;
  pointer-events: none;
  display: flex;
  align-items: flex-end;
  gap: 0;
  height: 70px;
}

/* Baloncuk (speech bubble) */
.bubble {
  position: absolute;
  background: rgba(255,183,197,0.18);
  border: 1px solid rgba(255,183,197,0.35);
  backdrop-filter: blur(4px);
  border-radius: 12px;
  padding: 5px 9px;
  font-size: 11px;
  font-family: var(--font-body);
  color: #ffd6e0;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  line-height: 1.4;
}
.bubble::after {
  content: '';
  position: absolute;
  bottom: -6px;
  width: 8px; height: 6px;
  background: rgba(255,183,197,0.18);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}

/* ── DEV EMOJI ── */
#dev {
  font-size: 30px;
  line-height: 1;
  filter: drop-shadow(0 2px 8px #00000055);
  position: relative;
  flex-shrink: 0;
  transition: transform .3s;
}
#dev-bubble {
  bottom: 68px;
  left: -10px;
}
#dev-bubble::after { left: 18px; }

/* ── HİKAYE SAHNESİ ── */
#story-stage {
  position: absolute;
  bottom: 10px;
  left: 14px;
  display: flex;
  align-items: flex-end;
  pointer-events: none;
  z-index: 5;
  height: 70px;
  width: calc(100% - 28px);
}
.story-char {
  font-size: 32px;
  line-height: 1;
  filter: drop-shadow(0 2px 10px #00000077);
  position: absolute;
  bottom: 4px;
  will-change: left, transform;
}
.speech {
  position: absolute;
  bottom: 52px;
  background: #1a0e1fee;
  backdrop-filter: blur(8px);
  border: 1px solid #e879a040;
  border-radius: 10px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--sakura3);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.35s;
  pointer-events: none;
  font-family: var(--font-body);
  font-weight: 500;
  letter-spacing: 0.2px;
}
.speech.on { opacity: 1; }
#hearts {
  position: absolute;
  bottom: 50px;
  font-size: 15px;
  opacity: 0;
  pointer-events: none;
  transition: none;
}

/* ══ PETAL ANIMATION — yavaş & soyut ══ */
(function() {
  const canvas = document.getElementById('petal-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, petals = [];

  // Soyut petal tipleri: düz geometrik şekiller, düşük opaklık
  const TYPES = [
    { color: '#ffb7c5', size: [5, 11], shape: 'teardrop', opacity: [0.12, 0.28] },
    { color: '#c084fc', size: [4, 9],  shape: 'teardrop', opacity: [0.10, 0.22] },
    { color: '#fda4af', size: [4, 8],  shape: 'diamond',  opacity: [0.10, 0.20] },
    { color: '#fce7f3', size: [6, 13], shape: 'teardrop', opacity: [0.08, 0.18] },
    { color: '#e879a0', size: [3, 7],  shape: 'diamond',  opacity: [0.08, 0.18] },
    { color: '#d8b4fe', size: [4, 8],  shape: 'teardrop', opacity: [0.09, 0.18] },
  ];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomPetal() {
    const t = TYPES[Math.floor(Math.random() * TYPES.length)];
    const sz = t.size[0] + Math.random() * (t.size[1] - t.size[0]);
    return {
      x: Math.random() * W,
      y: -30 - Math.random() * 200,
      size: sz,
      color: t.color,
      shape: t.shape,
      opacity: t.opacity[0] + Math.random() * (t.opacity[1] - t.opacity[0]),
      // çok yavaş düşüş
      speed: 0.18 + Math.random() * 0.32,
      drift: (Math.random() - 0.5) * 0.3,
      spin: (Math.random() - 0.5) * 0.008,
      angle: Math.random() * Math.PI * 2,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.005 + Math.random() * 0.008,
      // solma efekti
      fadeAge: 0,
      maxAge: 1800 + Math.random() * 1200,
    };
  }

  // Damla / yaprak formu (teardrop)
  function drawTeardrop(ctx, x, y, r, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.bezierCurveTo( r * 0.7, -r * 0.3,  r * 0.7,  r * 0.6, 0,  r * 0.9);
    ctx.bezierCurveTo(-r * 0.7,  r * 0.6, -r * 0.7, -r * 0.3, 0, -r);
    ctx.fill();
    ctx.restore();
  }

  // İnce eşkenar dörtgen
  function drawDiamond(ctx, x, y, r, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.lineTo(r * 0.45, 0);
    ctx.lineTo(0, r);
    ctx.lineTo(-r * 0.45, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // çok az spawn — max 28 yaprak
    if (petals.length < 28 && Math.random() < 0.04) {
      petals.push(randomPetal());
    }

    petals.forEach(p => {
      p.wobble   += p.wobbleSpeed;
      p.fadeAge  += 1;
      p.x += p.drift + Math.sin(p.wobble) * 0.25;
      p.y += p.speed;
      p.angle += p.spin;

      // yaşa göre opaklık solması
      const ageFade = p.fadeAge < 120 ? p.fadeAge / 120
                    : p.fadeAge > p.maxAge - 120 ? (p.maxAge - p.fadeAge) / 120
                    : 1;

      ctx.globalAlpha = p.opacity * Math.max(0, ageFade);
      ctx.fillStyle = p.color;

      if (p.shape === 'teardrop') drawTeardrop(ctx, p.x, p.y, p.size, p.angle);
      else                         drawDiamond(ctx, p.x, p.y, p.size, p.angle);
    });

    ctx.globalAlpha = 1;
    petals = petals.filter(p => p.y < H + 60 && p.fadeAge < p.maxAge);
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);

  // başlangıç: ekrana yayılmış
  for (let i = 0; i < 20; i++) {
    const p = randomPetal();
    p.y = Math.random() * H;
    p.fadeAge = Math.floor(Math.random() * 400);
    petals.push(p);
  }
  draw();
})();

/* ══ HİKAYE ANİMASYONU ══ */
(function() {
  const dev    = document.getElementById('dev-char');
  const chick  = document.getElementById('chick-char');
  const devSp  = document.getElementById('dev-sp');
  const chSp   = document.getElementById('chick-sp');
  const hearts = document.getElementById('hearts');

  // CSS var ile scaleX kontrolü
  function setAnim(el, kf, sx, dur) {
    el.style.setProperty('--sx', sx != null ? sx : 1);
    el.style.animation = `${kf} ${dur||700}ms ease-in-out ${
      kf.includes('bob')||kf.includes('type')||kf.includes('happy') ? 'infinite' : 'forwards'
    }`;
  }

  function setPos(el, x) { el.style.left = x + 'px'; }
  function getW() {
    const s = document.getElementById('story-stage');
    return s ? s.offsetWidth : window.innerWidth;
  }

  function say(el, posX, text, dur) {
    el.style.left = posX + 'px';
    el.textContent = text;
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), dur || 2000);
  }

  function popHearts(x) {
    hearts.style.left = (x + 8) + 'px';
    hearts.style.animation = 'none';
    void hearts.offsetWidth;
    hearts.style.animation = 'hearts-float 1.1s ease-out forwards';
  }

  function move(el, from, to, ms, kf, sx, done) {
    const t0 = performance.now();
    setPos(el, from);
    setAnim(el, kf, sx, 400);
    const step = now => {
      const p = Math.min((now - t0) / ms, 1);
      const e = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
      setPos(el, from + (to - from) * e);
      if (p < 1) requestAnimationFrame(step);
      else { setPos(el, to); if (done) done(); }
    };
    requestAnimationFrame(step);
  }

  function wait(ms, fn) { setTimeout(fn, ms); }





  function start() {
    const devX   = 28;
    const chickX = 72;

    setPos(dev,   devX);
    setPos(chick, chickX);
    setAnim(dev,   'kf-bob', 1, 2000);
    setAnim(chick, 'kf-bob', 1, 1800);
    hearts.style.opacity = '0';

    wait(1000,  () => say(chSp,  chickX, 'Filmi buldum ben 🐣', 2800));
    wait(4200,  () => say(devSp, devX,   'Hangi ülke? 🤨',      2600));
    wait(7200,  () => say(chSp,  chickX, 'İran 😊',             2600));
    wait(10200, () => {
      setAnim(dev, 'kf-shake', 1, 600);
      say(devSp, devX, 'yine mi 😑', 2600);
    });
    // 30 saniye sessizlik, sonra tekrar
    wait(13000 + 30000, start);
  }

  wait(1200, start);
})();

/* ══ SUPABASE ══ */
function initSB() {
  if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') { demoMode = true; return; }
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    document.getElementById('config-banner').classList.add('hidden');
  } catch(e) { demoMode = true; }
}

async function loadChecks() {
  if (demoMode) return;
  try {
    const { data, error } = await sb.from('country_checks').select('country_code,checked,film,stars');
    if (error) throw error;
    if (data) data.forEach(r => {
      if (r.checked || r.skipped) checks[r.country_code] = { checked: !!r.checked, skipped: !!r.skipped, film: r.film || '', stars: r.stars || 0 };
    });
  } catch(e) { console.warn('loadChecks:', e); }
}

async function saveCheck(code, data) {
  if (demoMode) return;
  try {
    if (data) {
      await sb.from('country_checks').upsert({ country_code: code, checked: !!data.checked, skipped: !!data.skipped, film: data.film || '', stars: data.stars || 0 });
    } else {
      await sb.from('country_checks').delete().eq('country_code', code);
    }
  } catch(e) { console.warn('saveCheck:', e); }
}

function subscribeRT() {
  if (!sb) return;
  sb.channel('cc').on('postgres_changes',{event:'*',schema:'public',table:'country_checks'}, p => {
    const r = p.new || p.old;
    if (!r) return;
    if (p.eventType === 'DELETE') delete checks[r.country_code];
    else checks[r.country_code] = { checked: !!r.checked, skipped: !!r.skipped, film: r.film || '', stars: r.stars || 0 };
    refreshItem(r.country_code);
    refreshMapPath(r.country_code);
    updateStats();
  }).subscribe();
}

/* ══ TOGGLE ══ */
function toggle(code) {
  const d = checks[code];
  if (d && d.checked) {
    // tiki kaldır, skipped ise koru
    if (d.skipped) {
      checks[code] = { checked: false, skipped: true, film: '', stars: 0 };
      saveCheck(code, checks[code]);
    } else {
      delete checks[code];
      saveCheck(code, null);
    }
  } else if (d && d.skipped) {
    // skipped durumdayken tıklandı → checked yap, skipped kaldır
    checks[code] = { checked: true, skipped: false, film: d.film || '', stars: d.stars || 0 };
    saveCheck(code, checks[code]);
    const info = document.querySelector(`.film-info[data-code="${code}"]`);
    if (info && !d.film) { info.classList.add('open'); info.querySelector('.film-input').focus(); }
  } else {
    checks[code] = { checked: true, skipped: false, film: '', stars: 0 };
    saveCheck(code, checks[code]);
    const info = document.querySelector(`.film-info[data-code="${code}"]`);
    if (info) { info.classList.add('open'); info.querySelector('.film-input').focus(); }
  }
  refreshItem(code);
  refreshMapPath(code);
  updateStats();
}

function skip(code, e) {
  e.stopPropagation();
  const d = checks[code];
  if (d && d.skipped) {
    // zaten skipped → kaldır
    if (d.checked) {
      checks[code] = { checked: true, skipped: false, film: d.film || '', stars: d.stars || 0 };
    } else {
      delete checks[code];
      saveCheck(code, null);
      refreshItem(code); refreshMapPath(code); updateStats(); return;
    }
  } else {
    // skip ekle
    checks[code] = { checked: !!(d && d.checked), skipped: true, film: d ? d.film : '', stars: d ? d.stars : 0 };
    // eğer checked ise iptal et
    checks[code].checked = false;
    if (d && d.checked) {
      const panel = document.querySelector(`.film-info[data-code="${code}"]`);
      if (panel) panel.classList.remove('open');
    }
  }
  saveCheck(code, checks[code]);
  refreshItem(code);
  refreshMapPath(code);
  updateStats();
}

  sec.innerHTML = '';

  regionOrder.forEach(region => {
    const list = COUNTRIES.filter(c => c.r === region);
    const color = REGION_COLORS[region];
    const grp = document.createElement('div');
    grp.className = 'region-group';
    grp.id = 'grp-' + region;
    grp.style.setProperty('--region-color', color);
    grp.innerHTML = `
      <div class="region-header">
        <div class="region-gem"></div>
        <span class="region-emoji">${REGIONS[region]}</span>
        <span class="region-title">${region}</span>
        <span class="region-count">${list.length} ülke</span>
      </div>
      <div class="country-grid" id="grid-${region}"></div>`;
    sec.appendChild(grp);

    const grid = grp.querySelector('.country-grid');
    list.forEach(c => {
      const d = checks[c.code];
      const isChecked = !!(d && d.checked);
      const filmName = d ? d.film : '';
      const stars = d ? d.stars : 0;

      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;';
      wrap.dataset.wrapCode = c.code;
      wrap.dataset.wrapRegion = c.r;

      const el = document.createElement('div');
      const isSkipped = !!(d && d.skipped);
      el.className = 'country-item' + (isChecked ? ' is-checked' : '') + (isSkipped ? ' is-skipped' : '');
      el.dataset.code = c.code;
      el.dataset.name = c.name.toLocaleLowerCase('tr');
      el.dataset.region = c.r;
      el.innerHTML = `
        <span class="flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
        <div class="film-badge${filmName ? ' visible' : ''}" data-badge="${c.code}">
          <span class="badge-stars">${'⭐'.repeat(stars)}</span><span class="badge-text">${filmName ? filmName.substring(0,16) : ''}</span>
        </div>
        <div class="skip-box${isSkipped ? ' active' : ''}" onclick="skip('${c.code}',event)" title="Pas geç">✕</div>
        <div class="check-box">${isChecked ? '✓' : ''}</div>`;
      el.onclick = () => toggle(c.code);
      el.addEventListener('mouseenter', () => { el.classList.add('map-hl'); hlMap(c.code, true); });
      el.addEventListener('mouseleave', () => { el.classList.remove('map-hl'); hlMap(c.code, false); });

      const panel = document.createElement('div');
      panel.className = 'film-info';
      panel.dataset.code = c.code;
      panel.innerHTML = `
        <input class="film-input" type="text" placeholder="🎬 Film adını yaz…" value="${filmName || ''}" maxlength="80">
        <div class="stars-row">
          <span class="stars-label">Puan</span>
          ${[1,2,3,4,5].map(i => `<button class="star-btn${stars>=i?' lit':''}" data-star="${i}" onclick="setStar('${c.code}',${i},this)">⭐</button>`).join('')}
        </div>
        <button class="film-save-btn" onclick="saveFilm('${c.code}')">Kaydet</button>`;

      panel.querySelector('.film-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') saveFilm(c.code);
      });

      wrap.appendChild(el);
      wrap.appendChild(panel);
      grid.appendChild(wrap);
    });
  });
}

function refreshItem(code) {
  const el = document.querySelector(`.country-item[data-code="${code}"]`);
  if (!el) return;
  const d = checks[code];
  const isChecked = !!(d && d.checked);
  const isSkipped = !!(d && d.skipped);
  el.classList.toggle('is-checked', isChecked);
  el.classList.toggle('is-skipped', isSkipped);
  el.querySelector('.check-box').textContent = isChecked ? '✓' : '';
  const skipBox = el.querySelector('.skip-box');
  if (skipBox) skipBox.classList.toggle('active', isSkipped);
  const panel = document.querySelector(`.film-info[data-code="${code}"]`);
  if (panel && !isChecked) panel.classList.remove('open');
  const badge = el.querySelector('.film-badge');
  if (badge) {
    const film = d ? d.film : '';
    const starsCount = d ? d.stars : 0;
    badge.classList.toggle('visible', !!(film && isChecked));
    const bt = badge.querySelector('.badge-text');
    if (bt) bt.textContent = film ? film.substring(0,16) : '';
    const bs = badge.querySelector('.badge-stars');
    if (bs) bs.textContent = '⭐'.repeat(starsCount);
  }
}

function setStar(code, val, btn) {
  const row = btn.closest('.stars-row');
  row.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('lit', i < val));
  if (!checks[code]) checks[code] = { checked: true, film: '', stars: 0 };
  checks[code].stars = val;
}

function saveFilm(code) {
  if (!checks[code]) return;
  const panel = document.querySelector(`.film-info[data-code="${code}"]`);
  if (!panel) return;
  const film = panel.querySelector('.film-input').value.trim();
  const stars = checks[code].stars || 0;
  checks[code].film = film;
  saveCheck(code, checks[code]);
  const badge = document.querySelector(`.country-item[data-code="${code}"] .film-badge`);
  if (badge) {
    badge.classList.toggle('visible', !!film);
    const bt = badge.querySelector('.badge-text');
    if (bt) bt.textContent = film ? film.substring(0,16) : '';
    const bs = badge.querySelector('.badge-stars');
    if (bs) bs.textContent = '⭐'.repeat(stars);
  }
  panel.classList.remove('open');
}

function refreshMapPath(code) {
  const region = CODE_TO_REGION[code];
  const color = region ? REGION_COLORS[region] : '#ffb7c5';
  const d = checks[code];
  const isChecked = !!(d && d.checked);
  const isSkipped = !!(d && d.skipped);
  document.querySelectorAll(`#world-map [data-code="${code}"]`).forEach(p => {
    p.classList.toggle('is-skipped', isSkipped);
    p.style.fill = isChecked ? color : '';
    p.style.filter = isChecked ? `drop-shadow(0 0 8px ${color}88)` : '';
    p.style.opacity = isSkipped ? '0.38' : '';
  });
}

function updateStats() {
  const checkedCount = Object.values(checks).filter(d => d.checked).length;
  document.getElementById('cnt-checked').textContent = checkedCount;
  document.getElementById('cnt-total').textContent = COUNTRIES.length;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  doFilter();
}

function doFilter() {
  const q = document.getElementById('search').value.toLocaleLowerCase('tr');
  const region = document.getElementById('rsel').value;
  document.querySelectorAll('[data-wrap-code]').forEach(wrap => {
    const code = wrap.dataset.wrapCode;
    const r = wrap.dataset.wrapRegion;
    const nameEl = wrap.querySelector('.country-name');
    const name = nameEl ? nameEl.textContent.toLocaleLowerCase('tr') : '';
    let show = true;
    if (q && !name.includes(q)) show = false;
    if (region && r !== region) show = false;
    const isChecked = !!(checks[code] && checks[code].checked);
    const isSkipped = !!(checks[code] && checks[code].skipped);
    if (activeFilter === 'checked' && !isChecked) show = false;
    wrap.style.display = show ? '' : 'none';
  });
  document.querySelectorAll('.region-group').forEach(g => {
    const any = [...g.querySelectorAll('[data-wrap-code]')].some(i => i.style.display !== 'none');
    g.style.display = any ? '' : 'none';
  });
}

function hlMap(code, on) {
  document.querySelectorAll(`#world-map [data-code="${code}"]`).forEach(p =>
    p.classList.toggle('hover-hl', on)
  );
  const tip = document.getElementById('map-tip');
  if (on) {
    const c = COUNTRIES.find(x => x.code === code);
    tip.textContent = c ? `${c.flag}  ${c.name}` : code;
    tip.style.opacity = '1';
  } else {
    tip.style.opacity = '0';
  }
}

function loadMap() {
  const d3s = document.createElement('script');
  d3s.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js';
  d3s.onload = () => {
    const ts = document.createElement('script');
    ts.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
    ts.onload = () => {
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(r => r.json())
        .then(topo => renderMap(topo))
        .catch(() => finishLoading());
    };
    document.head.appendChild(ts);
  };
  document.head.appendChild(d3s);
}

function renderMap(topo) {
  const svg = d3.select('#world-map');
  const proj = d3.geoNaturalEarth1().scale(320).translate([1000, 500]);
  const path = d3.geoPath().projection(proj);
  const countries = topojson.feature(topo, topo.objects.countries);

  svg.selectAll('path')
    .data(countries.features)
    .join('path')
    .attr('d', path)
    .attr('data-code', d => NUM_TO_A2[+d.id] || '')
    .each(function(d) {
      const code = NUM_TO_A2[+d.id];
      if (!code) return;
      const entry = checks[code];
      if (entry && entry.checked) {
        const region = CODE_TO_REGION[code];
        const color = REGION_COLORS[region] || '#ffb7c5';
        this.style.fill = color;
        this.style.filter = `drop-shadow(0 0 8px ${color}88)`;
      }
      if (entry && entry.skipped) {
        this.classList.add('is-skipped');
        this.style.opacity = '0.38';
      }
    })
    .on('mouseenter', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      if (!code) return;
      d3.select(this).classed('hover-hl', true);
      const c = COUNTRIES.find(x => x.code === code);
      const tip = document.getElementById('map-tip');
      tip.textContent = c ? `${c.flag}  ${c.name}` : code;
      tip.style.opacity = '1';
      const li = document.querySelector(`.country-item[data-code="${code}"]`);
      if (li) li.classList.add('map-hl');
    })
    .on('mouseleave', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      d3.select(this).classed('hover-hl', false);
      document.getElementById('map-tip').style.opacity = '0';
      if (code) {
        const li = document.querySelector(`.country-item[data-code="${code}"]`);
        if (li) li.classList.remove('map-hl');
      }
    })
    .on('click', function(e, d) {
      const code = NUM_TO_A2[+d.id];
      if (code && COUNTRIES.find(c => c.code === code)) toggle(code);
    });

  finishLoading();
}

function finishLoading() {
  const l = document.getElementById('loading');
  l.classList.add('fade-out');
  setTimeout(() => l.remove(), 500);
}

async function init() {
  initSB();
  await loadChecks();
  renderList();
  updateStats();
  subscribeRT();
  loadMap();
}

init();
</script>

  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
</div>
